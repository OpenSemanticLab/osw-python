# Project metadata and dependencies moved to pyproject.toml ([project] table).
# The tool sections below (pytest, black, flake8) are retained temporarily and
# migrate to pyproject.toml / ruff in the dev-tooling phase.

[tool:pytest]
# Specify command line options as you would do when invoking pytest directly.
# e.g. --cov-report html (or xml) for html/xml output or --junitxml junit.xml
# in order to write a coverage file that can be read by Jenkins.
# CAUTION: --cov flags may prohibit setting breakpoints while debugging.
#          Comment those flags to avoid this pytest issue.
addopts =
    --cov osw --cov-report term-missing
    --verbose
norecursedirs =
    dist
    build
    .tox
testpaths = tests
asyncio_default_fixture_loop_scope = function

[tool.black]
line-length = 88

[flake8]
# Some sane defaults for the code style checker flake8
# 79 characters is the default line length according to PEP8
# 88 is the option recommended by black
max_line_length = 88
select = C,E,F,W,B,B950
extend_ignore = E203, E501, W503
# ^  Black-compatible
#    E203 and W503 have edge cases handled by black
# E501 allows a line length of 79 only
exclude =
    .tox
    build
    dist
    .eggs
    docs/conf.py
    src/osw/model/entity.py #autogenerated
per-file-ignores =
    __init__.py:F401
