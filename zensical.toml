[project]
site_name = "OpenSemanticWorld Python Package (osw)"
repo_url = "https://github.com/OpenSemanticLab/osw-python"
site_url = "https://OpenSemanticLab.github.io/osw-python/"
site_description = "Python toolset for data processing, queries, wikicode generation and page manipulation within OpenSemanticLab."
site_author = "OpenSemanticWorld"
edit_uri = "edit/main/docs/"
repo_name = "OpenSemanticLab/osw-python"
copyright = 'Maintained by <a href="https://github.com/OpenSemanticWorld">OpenSemanticWorld</a>.'

nav = [
    { "Home" = "index.md" },
    { "Tools" = "tools.md" },
    { "Authentication" = "auth.md" },
    { "OSW" = "osw.md" },
    { "Model" = "model.md" },
    { "Controller" = "controller.md" },
    { "Development" = "dev.md" },
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.tabs",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
previous = "fontawesome/solid/angle-left"
next = "fontawesome/solid/angle-right"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "white"
accent = "deep orange"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "deep orange"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

# Docs versioning: version selector fed by mike (versions.json on the
# gh-pages branch). main -> dev, tag vX.Y.Z -> X.Y.Z + latest alias.
[project.extra.version]
provider = "mike"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/OpenSemanticLab/osw-python"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/osw"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.superfences]

[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.toc]
permalink = true
